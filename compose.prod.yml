name: music-discovery-app-prod
services:
  redis:
    image: redis:7.4
    ports:
      - 6379:6379
    networks:
      - discovery-network-prod
    volumes:
      - redis-data-prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
  mongo:
    attach: false
    image: mongo:8.0
    ports:
      - 27017:27017
    networks:
      - discovery-network-prod
    volumes:
      - mongo-data-prod:/data/db
    command: mongod --auth # Enable authentication
    environment:
      # The official mongo image does not support _FILE-suffix secret injection for
      # MONGO_INITDB_ROOT_* variables (unlike Postgres). Docker secrets cannot be used
      # here. Supply DB_USER and DB_PASSWORD via --env-file or as shell env vars when
      # running in production (e.g. export DB_USER=$(cat ./secrets/DB_USER.txt)).
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
      MONGO_INITDB_DATABASE: music-discovery-app-prod

  backend:
    build:
      context: .
      dockerfile: ./Dockerfile.backend.prod
    environment:
      NODE_ENV: production
      DB_HOST: mongo
      DB_PORT: 27017
      DB_NAME: music-discovery-app-prod
      PORT: 3001
    ports:
      - 3001:3001
    networks:
      - discovery-network-prod
    depends_on:
      - mongo
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/health"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 30s
    secrets:
      - DB_USER
      - DB_PASSWORD
      - SESSION_SECRET
      - RESEND_API_KEY

  frontend:
    build:
      context: .
      dockerfile: ./Dockerfile.frontend.prod
    environment:
      NODE_ENV: production
    ports:
      - 3000:3000
    networks:
      - discovery-network-prod
    depends_on:
      - backend

secrets:
  DB_USER:
    file: ./secrets/DB_USER.txt
  DB_PASSWORD:
    file: ./secrets/DB_PASSWORD.txt
  SESSION_SECRET:
    file: ./secrets/SESSION_SECRET.txt
  RESEND_API_KEY:
    file: ./secrets/RESEND_API_KEY.txt

networks: # allow services to talk to each other while providing isolation from other docker container, running on the same host
  discovery-network-prod:
    driver: bridge

volumes: # enable persistence of database data across container restart
  mongo-data-prod:
    driver: local
  redis-data-prod:
    driver: local
