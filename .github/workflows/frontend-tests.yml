name: Frontend Tests

on:
  pull_request:
    branches: [main]

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build workspace dependencies
        run: |
          yarn workspace @common/types build
          yarn workspace @common/json-data build
          yarn workspace @common/validation build
          yarn workspace @mda/components build

      - name: Run frontend tests
        run: yarn workspace frontend test
        env:
          NODE_ENV: test
